[pytest]
testpaths = tests
python_files = test_*.py
markers =
	slow: marks tests that are slower integration flows
filterwarnings =
	ignore:'asyncio.iscoroutinefunction' is deprecated:DeprecationWarning:asyncio
	ignore:.*iscoroutinefunction.*:DeprecationWarning
	ignore:datetime.datetime.utcnow.*:DeprecationWarning
